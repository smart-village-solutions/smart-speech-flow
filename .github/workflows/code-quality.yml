name: Code Quality Pipeline

# Trigger auf alle wichtigen Events
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # Manueller Trigger

# Globale Umgebungsvariablen
env:
  PYTHON_VERSION: '3.12'
  SONAR_HOST_URL: 'https://sonarcloud.io'
  SONAR_ENABLED: ${{ secrets.SONAR_TOKEN != '' }}

jobs:
  # Job 1: Code Formatting und Linting
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Create virtual environment
      run: |
        python -m venv .venv
        source .venv/bin/activate
        echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> $GITHUB_ENV
        echo "$VIRTUAL_ENV/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        source .venv/bin/activate
        pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Check code formatting with Black
      run: |
        source .venv/bin/activate
        black --check --diff services/ || echo "::warning::Black formatting issues found"
      continue-on-error: true

    - name: Check import sorting with isort
      run: |
        source .venv/bin/activate
        isort --check-only --diff services/ || echo "::warning::Import sorting issues found"
      continue-on-error: true

    - name: Lint code with flake8
      run: |
        source .venv/bin/activate
        flake8 services/ --format=github --statistics --tee --output-file=flake8-report.txt --exit-zero

    - name: Upload flake8 report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: flake8-report
        path: flake8-report.txt
        retention-days: 30

  # Job 2: Security Analysis
  security-analysis:
    name: Security Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Create virtual environment
      run: |
        python -m venv .venv
        source .venv/bin/activate
        echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> $GITHUB_ENV
        echo "$VIRTUAL_ENV/bin" >> $GITHUB_PATH

    - name: Install security tools
      run: |
        source .venv/bin/activate
        pip install --upgrade pip
        pip install bandit pip-audit

    - name: Run Bandit security analysis
      run: |
        source .venv/bin/activate
        bandit -r services/ -f json -o bandit-report.json || true
        bandit -r services/ -f txt -o bandit-report.txt || true

    - name: Check for high/critical security issues
      run: |
        source .venv/bin/activate
        # Fail if high or critical issues found
        HIGH_ISSUES=$(bandit -r services/ -f json | jq '.results[] | select(.issue_severity == "HIGH" or .issue_severity == "MEDIUM") | length' | wc -l)
        echo "High/Medium security issues found: $HIGH_ISSUES"
        if [ "$HIGH_ISSUES" -gt "5" ]; then
          echo "❌ Too many high/medium severity security issues found!"
          bandit -r services/ -ll
          exit 1
        else
          echo "✅ Security check passed"
        fi

    - name: Run pip-audit for dependency vulnerabilities
      run: |
        source .venv/bin/activate
        pip-audit --format=json --output=pip-audit-report.json || true
        pip-audit --format=text --output=pip-audit-report.txt || true
        # Check if vulnerabilities exist (non-blocking for now)
        if [ -f "pip-audit-report.json" ]; then
          VULN_COUNT=$(cat pip-audit-report.json | jq '.vulnerabilities | length' 2>/dev/null || echo "0")
          echo "Vulnerabilities found: $VULN_COUNT"
          if [ "$VULN_COUNT" -gt "0" ]; then
            echo "::warning::Vulnerable dependencies found ($VULN_COUNT)"
            pip-audit || true
          else
            echo "✅ No vulnerable dependencies found"
          fi
        fi

    - name: Upload security reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          bandit-report.*
          pip-audit-report.*
        retention-days: 30

  # Job 3: Type Checking (optional, da graduelle Einführung)
  type-checking:
    name: Type Checking
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true  # Nicht blockierend während der Einführung

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Create virtual environment
      run: |
        python -m venv .venv
        source .venv/bin/activate
        echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> $GITHUB_ENV
        echo "$VIRTUAL_ENV/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        source .venv/bin/activate
        pip install --upgrade pip
        pip install mypy types-requests types-redis
        pip install -r requirements-dev.txt

    - name: Run MyPy type checking
      run: |
        source .venv/bin/activate
        mypy services/api_gateway/ --ignore-missing-imports --show-error-codes --pretty || true

    - name: Generate type coverage report
      run: |
        source .venv/bin/activate
        mypy services/api_gateway/ --html-report mypy-report --ignore-missing-imports || true

    - name: Upload type checking report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: mypy-report
        path: mypy-report/
        retention-days: 30

  # Job 4: Dependency Analysis
  dependency-analysis:
    name: Dependency Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Check for dependency conflicts
      run: |
        echo "🔍 Starting dependency validation..."
        python -m venv .venv
        source .venv/bin/activate
        pip install --upgrade pip

        echo "📦 Checking service dependencies..."
        FAILED_SERVICES=()
        ALL_SERVICES=()

        for service_dir in services/*/; do
          if [ -f "$service_dir/requirements.txt" ]; then
            service_name=$(basename "$service_dir")
            ALL_SERVICES+=("$service_name")
            echo "🔍 Checking $service_name..."

            # Create temporary venv for each service
            temp_venv=".venv_${service_name}"
            python -m venv "$temp_venv"
            source "$temp_venv/bin/activate"

            if pip install -r "$service_dir/requirements.txt" > /dev/null 2>&1; then
              echo "   ✅ $service_name installs successfully"
            else
              echo "   ❌ $service_name installation failed"
              FAILED_SERVICES+=("$service_name")
            fi

            deactivate
            rm -rf "$temp_venv"
          fi
        done

        echo ""
        echo "📊 Dependency Check Summary:"
        echo "   Services checked: ${#ALL_SERVICES[@]}"

        if [ ${#FAILED_SERVICES[@]} -eq 0 ]; then
          echo "✅ All dependency checks passed!"
        else
          echo "::warning::Dependency issues found in: ${FAILED_SERVICES[*]}"
          echo "💡 Check requirements.txt files for conflicting or invalid dependencies"
        fi

  # Job 5: SonarCloud Analysis
  sonar-analysis:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ env.SONAR_ENABLED == 'true' }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Create virtual environment
      run: |
        python -m venv .venv
        source .venv/bin/activate
        echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> $GITHUB_ENV
        echo "$VIRTUAL_ENV/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        source .venv/bin/activate
        pip install --upgrade pip
        pip install -r requirements-dev.txt -r services/api_gateway/requirements.txt

    - name: Run tests with coverage for Sonar
      run: |
        source .venv/bin/activate
        export PYTHONPATH=.
        pytest tests/ --cov=services --cov-report=xml:coverage.xml --cov-report=term

    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
      with:
        args: >
          -Dsonar.organization=${{ vars.SONAR_ORGANIZATION || github.repository_owner }}
          -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY || format('{0}_{1}', github.repository_owner, github.event.repository.name) }}
          -Dsonar.python.version=${{ env.PYTHON_VERSION }}
          -Dsonar.python.coverage.reportPaths=coverage.xml
          -Dsonar.qualitygate.wait=true
          -Dsonar.qualitygate.timeout=300

  # Job 6: Quality Gate Evaluation
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [code-quality, security-analysis, sonar-analysis]
    if: always()

    steps:
    - name: Evaluate Quality Gate
      run: |
        CODE_QUALITY_RESULT="${{ needs.code-quality.result }}"
        SECURITY_RESULT="${{ needs.security-analysis.result }}"
        SONAR_RESULT="${{ needs.sonar-analysis.result }}"

        echo "Code Quality Result: $CODE_QUALITY_RESULT"
        echo "Security Analysis Result: $SECURITY_RESULT"
        echo "Sonar Result: $SONAR_RESULT"

        # Sonar is blocking once configured; missing secrets/vars keep the job skipped.
        if [ "$SONAR_RESULT" = "failure" ]; then
          echo "❌ Sonar quality gate failed"
          exit 1
        fi

        if [ "$CODE_QUALITY_RESULT" != "success" ] || [ "$SECURITY_RESULT" != "success" ]; then
          echo "::warning::Quality gate checks found issues in non-Sonar jobs"
          echo "Code quality and security should be reviewed."
        elif [ "$SONAR_RESULT" = "skipped" ]; then
          echo "::warning::Sonar analysis skipped - configure SONAR_TOKEN (and optional Sonar variables if defaults do not match)"
        else
          echo "✅ Quality gate passed!"
          echo "All blocking quality checks successful."
        fi

  # Job 7: Quality Metrics Summary
  quality-summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs: [code-quality, security-analysis, type-checking, dependency-analysis, sonar-analysis, quality-gate]
    if: always()

    steps:
    - name: Create Quality Summary
      run: |
        echo "# Code Quality Summary 📊" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Check | Status | Notes |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|---------|-------|" >> $GITHUB_STEP_SUMMARY

        # Code Quality
        if [ "${{ needs.code-quality.result }}" == "success" ]; then
          echo "| Code Quality | ✅ Passed | Formatting and linting checks successful |" >> $GITHUB_STEP_SUMMARY
        else
          echo "| Code Quality | ❌ Failed | Check formatting and linting issues |" >> $GITHUB_STEP_SUMMARY
        fi

        # Security Analysis
        if [ "${{ needs.security-analysis.result }}" == "success" ]; then
          echo "| Security | ✅ Passed | No critical security issues found |" >> $GITHUB_STEP_SUMMARY
        else
          echo "| Security | ❌ Failed | Critical security issues detected |" >> $GITHUB_STEP_SUMMARY
        fi

        # SonarCloud
        if [ "${{ needs.sonar-analysis.result }}" == "success" ]; then
          echo "| SonarCloud | ✅ Passed | Analysis and quality gate successful |" >> $GITHUB_STEP_SUMMARY
        elif [ "${{ needs.sonar-analysis.result }}" == "failure" ]; then
          echo "| SonarCloud | ❌ Failed | Analysis or quality gate failed |" >> $GITHUB_STEP_SUMMARY
        else
          echo "| SonarCloud | ⚠️ Skipped | Configure SONAR_TOKEN and optional Sonar variables if needed |" >> $GITHUB_STEP_SUMMARY
        fi

        # Type Checking (optional)
        if [ "${{ needs.type-checking.result }}" == "success" ]; then
          echo "| Type Checking | ✅ Passed | Type annotations valid |" >> $GITHUB_STEP_SUMMARY
        elif [ "${{ needs.type-checking.result }}" == "failure" ]; then
          echo "| Type Checking | ⚠️ Issues | Type checking found issues (not blocking) |" >> $GITHUB_STEP_SUMMARY
        else
          echo "| Type Checking | ➖ Skipped | Type checking skipped |" >> $GITHUB_STEP_SUMMARY
        fi

        # Dependency Analysis
        if [ "${{ needs.dependency-analysis.result }}" == "success" ]; then
          echo "| Dependencies | ✅ Passed | No dependency conflicts |" >> $GITHUB_STEP_SUMMARY
        else
          echo "| Dependencies | ❌ Failed | Dependency conflicts detected |" >> $GITHUB_STEP_SUMMARY
        fi

        # Overall Quality Gate
        if [ "${{ needs.quality-gate.result }}" == "success" ]; then
          echo "| **Overall** | **✅ PASSED** | **All mandatory checks successful** |" >> $GITHUB_STEP_SUMMARY
        else
          echo "| **Overall** | **❌ FAILED** | **Quality gate requirements not met** |" >> $GITHUB_STEP_SUMMARY
        fi

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Next Steps" >> $GITHUB_STEP_SUMMARY
        echo "- Review failed checks and fix identified issues" >> $GITHUB_STEP_SUMMARY
        echo "- Download artifacts for detailed reports" >> $GITHUB_STEP_SUMMARY
        echo "- Check the Actions logs for specific error details" >> $GITHUB_STEP_SUMMARY
