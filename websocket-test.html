<!DOCTYPE html>
<html>
<head>
    <title>SSF WebSocket Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 600px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .connected { background-color: #d4edda; color: #155724; }
        .disconnected { background-color: #f8d7da; color: #721c24; }
        .connecting { background-color: #fff3cd; color: #856404; }
        #messages { border: 1px solid #ddd; height: 300px; overflow-y: auto; padding: 10px; margin: 10px 0; }
        input, button { padding: 8px; margin: 5px; }
        #sessionId { width: 200px; }
        #messageInput { width: 300px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SSF WebSocket Test</h1>

        <div>
            <label for="sessionId">Session ID:</label>
            <input type="text" id="sessionId" placeholder="Enter session ID" value="2B73C3C3">
            <select id="clientType">
                <option value="admin">Admin</option>
                <option value="customer">Customer</option>
            </select>
            <button id="connectBtn">Connect</button>
            <button id="disconnectBtn" disabled>Disconnect</button>
        </div>

        <div id="status" class="status disconnected">
            Disconnected
        </div>

        <div>
            <input type="text" id="messageInput" placeholder="Enter message" disabled>
            <button id="sendBtn" disabled>Send</button>
        </div>

        <div id="messages"></div>
    </div>

    <script>
        let ws = null;
        const statusDiv = document.getElementById('status');
        const messagesDiv = document.getElementById('messages');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const sendBtn = document.getElementById('sendBtn');
        const messageInput = document.getElementById('messageInput');
        const sessionIdInput = document.getElementById('sessionId');
        const clientTypeSelect = document.getElementById('clientType');

        function updateStatus(message, className) {
            statusDiv.textContent = message;
            statusDiv.className = `status ${className}`;
        }

        function addMessage(message) {
            const div = document.createElement('div');
            div.textContent = `${new Date().toLocaleTimeString()}: ${message}`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function connect() {
            const sessionId = sessionIdInput.value.trim();
            const clientType = clientTypeSelect.value;

            if (!sessionId) {
                alert('Please enter a session ID');
                return;
            }

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const host = window.location.host;
            const wsUrl = `${protocol}//${host}/ws/${sessionId}/${clientType}`;

            addMessage(`Connecting to: ${wsUrl}`);
            updateStatus('Connecting...', 'connecting');

            ws = new WebSocket(wsUrl);

            ws.onopen = function(event) {
                addMessage('WebSocket connected successfully!');
                updateStatus('Connected', 'connected');
                connectBtn.disabled = true;
                disconnectBtn.disabled = false;
                sendBtn.disabled = false;
                messageInput.disabled = false;
            };

            ws.onmessage = function(event) {
                addMessage(`Received: ${event.data}`);
            };

            ws.onclose = function(event) {
                addMessage(`WebSocket closed. Code: ${event.code}, Reason: ${event.reason}`);
                updateStatus('Disconnected', 'disconnected');
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
                sendBtn.disabled = true;
                messageInput.disabled = true;
                ws = null;
            };

            ws.onerror = function(error) {
                addMessage(`WebSocket error: ${error}`);
                updateStatus('Error', 'disconnected');
            };
        }

        function disconnect() {
            if (ws) {
                ws.close();
            }
        }

        function sendMessage() {
            const message = messageInput.value.trim();
            if (message && ws && ws.readyState === WebSocket.OPEN) {
                const messageObj = {
                    type: 'message',
                    content: message,
                    timestamp: new Date().toISOString()
                };
                ws.send(JSON.stringify(messageObj));
                addMessage(`Sent: ${message}`);
                messageInput.value = '';
            }
        }

        // Event listeners
        connectBtn.addEventListener('click', connect);
        disconnectBtn.addEventListener('click', disconnect);
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Auto-populate session ID if in URL
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('session')) {
            sessionIdInput.value = urlParams.get('session');
        }
    </script>
</body>
</html>
