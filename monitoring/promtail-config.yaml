server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/lib/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels: ['__meta_docker_container_id']
        target_label: __path__
        replacement: '/var/lib/docker/containers/$1/$1-json.log'
    pipeline_stages:
      - match:
          selector: '{service="api_gateway"}'
          stages:
            - regex:
                expression: 'Frontend-Response: success, originalText=(?P<original>[^,]+), translatedText=(?P<translated>[^,]+)'
            - labels:
                pipeline_original_text: original
                pipeline_translated_text: translated
      - match:
          selector: '{service="api_gateway"}'
          stages:
            - regex:
                expression: 'Frontend-Response: Fehler: (?P<error>.*)'
            - labels:
                pipeline_error: error
