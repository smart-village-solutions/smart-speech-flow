global:
  scrape_interval: 15s
rule_files:
  - alert_rules.yml
scrape_configs:
  - job_name: 'asr'
    static_configs:
      - targets: ['asr:8000']
  - job_name: 'translation'
    static_configs:
      - targets: ['translation:8000']
  - job_name: 'tts'
    static_configs:
      - targets: ['tts:8000']
  - job_name: 'api_gateway'
    static_configs:
      - targets: ['api_gateway:8000']

  - job_name: 'dcgm_exporter'
    static_configs:
      - targets: ['dcgm_exporter:9400']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node_exporter:9100']
