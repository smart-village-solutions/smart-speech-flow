global:
  scrape_interval: 15s
scrape_configs:
  - job_name: 'asr'
    static_configs:
      - targets: ['asr:8000']
  - job_name: 'translation'
    static_configs:
      - targets: ['translation:8000']
  - job_name: 'tts'
    static_configs:
      - targets: ['tts:8000']
  - job_name: 'api_gateway'
    static_configs:
      - targets: ['api_gateway:8000']

  - job_name: 'gpu'
    static_configs:
      - targets: ['host.docker.internal:9400']
