groups:
  - name: ssf-service-health
    rules:
      - alert: ASRServiceDown
        expr: asr_health_status == 0
        for: 2m
        labels:
          severity: critical
          service: asr
        annotations:
          summary: ASR service is reporting a degraded health state.
          description: The asr_health_status gauge has been 0 for more than 2 minutes. Investigate the ASR container logs and GPU availability.

      - alert: TranslationServiceDown
        expr: translation_health_status == 0
        for: 2m
        labels:
          severity: critical
          service: translation
        annotations:
          summary: Translation service is unhealthy.
          description: The translation_health_status gauge has been 0 for more than 2 minutes. Check model loading status and GPU resources.

      - alert: TTSServiceDown
        expr: tts_health_status == 0
        for: 2m
        labels:
          severity: critical
          service: tts
        annotations:
          summary: TTS service is unhealthy.
          description: The tts_health_status gauge has been 0 for more than 2 minutes. Verify TTS model caches and GPU utilisation.

      - alert: TranslationLatencyHigh
        expr: histogram_quantile(0.95, sum(rate(translation_request_latency_seconds_bucket[5m])) by (le)) > 3
        for: 5m
        labels:
          severity: warning
          service: translation
        annotations:
          summary: 95th percentile translation latency above 3s.
          description: The translation_request_latency_seconds histogram indicates sustained latency. Consider scaling translation pods or checking upstream ASR delays.

      - alert: GPUUtilisationCritical
        expr: max_over_time(DCGM_FI_DEV_GPU_UTIL[5m]) > 90
        for: 5m
        labels:
          severity: critical
          component: gpu
        annotations:
          summary: GPU utilisation above 90% for 5m.
          description: The DCGM_FI_DEV_GPU_UTIL metric shows saturation. Consider scaling out or reducing load.

      - alert: GPUMemoryPressure
        expr: max_over_time(DCGM_FI_DEV_FB_USED[5m]) / max_over_time(DCGM_FI_DEV_FB_TOTAL[5m]) > 0.95
        for: 5m
        labels:
          severity: warning
          component: gpu
        annotations:
          summary: GPU memory usage above 95%.
          description: GPU memory usage is approaching the limit. Evaluate model footprint and concurrent load.

  - name: websocket-health
    rules:
      - alert: WebSocketConnectionsHigh
        expr: websocket_connections_active > 100
        for: 2m
        labels:
          severity: warning
          component: websocket
        annotations:
          summary: High number of active WebSocket connections
          description: "Currently {{ $value }} active WebSocket connections. Monitor system resources and connection patterns."

      - alert: WebSocketConnectionFailures
        expr: rate(websocket_disconnects_total{disconnect_reason!="client_disconnect"}[5m]) > 0.1
        for: 1m
        labels:
          severity: critical
          component: websocket
        annotations:
          summary: High WebSocket connection failure rate
          description: "WebSocket disconnect rate of {{ $value }}/sec for non-client disconnects. Check network connectivity and server health."

      - alert: WebSocketHeartbeatLatencyHigh
        expr: histogram_quantile(0.95, sum(rate(websocket_heartbeat_latency_seconds_bucket[5m])) by (le)) > 1.0
        for: 3m
        labels:
          severity: warning
          component: websocket
        annotations:
          summary: High WebSocket heartbeat latency
          description: "95th percentile heartbeat latency is {{ $value }}s. Network issues or server overload may be occurring."

      - alert: WebSocketSessionsStale
        expr: websocket_connections_active - websocket_sessions_with_connections > 10
        for: 5m
        labels:
          severity: warning
          component: websocket
        annotations:
          summary: Stale WebSocket connections detected
          description: "{{ $value }} WebSocket connections appear to be stale (not associated with active sessions)."

      - alert: WebSocketErrorRateHigh
        expr: rate(websocket_errors_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
          component: websocket
        annotations:
          summary: High WebSocket error rate
          description: "WebSocket error rate of {{ $value }}/sec. Check application logs and client connection patterns."

      - alert: WebSocketOriginBlocked
        expr: rate(websocket_disconnects_total{disconnect_reason="origin_not_allowed"}[5m]) > 0.01
        for: 1m
        labels:
          severity: warning
          component: websocket
        annotations:
          summary: WebSocket connections blocked due to CORS
          description: "{{ $value }}/sec WebSocket connections blocked due to origin restrictions. Review CORS configuration."

      - alert: WebSocketBroadcastFailureRateHigh
        expr: rate(websocket_broadcast_failure_total[5m]) / rate(websocket_broadcast_total[5m]) > 0.01
        for: 2m
        labels:
          severity: critical
          component: websocket
          feature: broadcasting
        annotations:
          summary: High WebSocket broadcast failure rate (>1%)
          description: "Broadcast failure rate is {{ $value | humanizePercentage }}. Check WebSocketManager health and connection state."
          runbook_url: "https://docs.smart-village.solutions/runbooks/websocket-broadcast-failures"

      - alert: WebSocketBroadcastMessagesNotDelivered
        expr: rate(websocket_broadcast_messages_failed_total[5m]) > 0.05
        for: 1m
        labels:
          severity: warning
          component: websocket
          feature: broadcasting
        annotations:
          summary: WebSocket messages failing to deliver
          description: "{{ $value }}/sec messages failed to deliver. Verify client connections and network health."

      - alert: WebSocketBroadcastNoActivity
        expr: rate(websocket_broadcast_total[10m]) == 0 and websocket_connections_active > 0
        for: 10m
        labels:
          severity: info
          component: websocket
          feature: broadcasting
        annotations:
          summary: No broadcast activity despite active connections
          description: "Active WebSocket connections exist but no broadcasts in 10 minutes. May be expected during idle periods."

      - alert: WebSocketSessionConnectionMismatch
        expr: websocket_sessions_with_connections > 0 and websocket_connections_active == 0
        for: 5m
        labels:
          severity: warning
          component: websocket
        annotations:
          summary: Session-Connection state mismatch detected
          description: "Sessions report connections but connection count is 0. Possible state corruption in WebSocketManager."

  - name: ssf-audio-storage
    rules:
      - alert: AudioStorageDiskUsageHigh
        expr: audio_storage_disk_usage_bytes / (1024 * 1024 * 1024) > 0.8 * 10
        for: 5m
        labels:
          severity: warning
          component: audio-storage
        annotations:
          summary: Audio storage disk usage above 80%
          description: "Audio storage is using {{ $value | humanize }}GB (>80% of estimated 10GB capacity). Consider increasing disk space or reducing retention period."

      - alert: AudioStorageDiskUsageCritical
        expr: audio_storage_disk_usage_bytes / (1024 * 1024 * 1024) > 0.95 * 10
        for: 2m
        labels:
          severity: critical
          component: audio-storage
        annotations:
          summary: Audio storage disk usage above 95%
          description: "Audio storage critically full at {{ $value | humanize }}GB (>95%). Immediate action required - cleanup may fail soon."

      - alert: AudioCleanupFailing
        expr: rate(audio_cleanup_deleted_files_total[1h]) == 0
        for: 2h
        labels:
          severity: warning
          component: audio-storage
        annotations:
          summary: Audio cleanup job not deleting any files
          description: "No files deleted by audio cleanup in the last 2 hours. Check if cleanup background task is running and retention period is correctly configured."

      - alert: AudioStorageFileCountHigh
        expr: sum(audio_files_total) > 10000
        for: 5m
        labels:
          severity: warning
          component: audio-storage
        annotations:
          summary: High number of audio files stored
          description: "{{ $value }} audio files currently stored. This may indicate high traffic or cleanup issues."
