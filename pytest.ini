[pytest]
asyncio_mode = auto
testpaths = tests
addopts = -v --tb=short --strict-markers -p no:warnings
markers =
    asyncio: mark test as requiring asyncio event loop
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    load: marks tests that generate significant load against local services
    unit: marks tests as unit tests
    real_system: marks tests that use real HTTP services
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
