services:
  traefik:
    image: traefik:v2.10
    command:
      - --api.dashboard=true
      - --log.level=DEBUG
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.tlschallenge=true
      - --certificatesresolvers.le.acme.email=admin@smart-village.solutions
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    restart: always

  asr:
    build: ./services/asr
    ports:
      - "8001:8000"
    volumes:
      - ./models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  translation:
    build: ./services/translation
    ports:
      - "8002:8000"
    volumes:
      - ./models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  tts:
    build: ./services/tts
    ports:
      - "8003:8000"
    volumes:
      - ./models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  api_gateway:
    build:
      context: .
      dockerfile: services/api_gateway/Dockerfile
    ports:
      - "8000:8000"

    # Resource Limits (verhindert OOM bei vielen Audio-Files)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G

    volumes:
      # Persistent Audio Storage (Bind Mount)
      - type: bind
        source: ./data/audio
        target: /data/audio
        bind:
          create_host_path: true

      # Temporary Upload Buffer (RAM - tmpfs)
      - type: tmpfs
        target: /tmp/audio
        tmpfs:
          size: 1G

    environment:
      - REDIS_URL=redis://redis:6379/0
      - REDIS_NAMESPACE=ssf
      - CLIENT_BASE_URL=https://translate.smart-village.solutions
      # Audio Storage Configuration
      - AUDIO_STORAGE_PATH=/data/audio
      - AUDIO_RETENTION_HOURS=24
      - AUDIO_TEMP_PATH=/tmp/audio
      - AUDIO_MAX_DISK_USAGE_GB=9
      - AUDIO_CLEANUP_INTERVAL_MINUTES=60
      - ENABLE_PIPELINE_METADATA=true
      # LLM Refinement Configuration
      - LLM_REFINEMENT_ENABLED=${LLM_REFINEMENT_ENABLED:-true}
      - LLM_REFINEMENT_MODEL=${LLM_REFINEMENT_MODEL:-gpt-oss:20b}
      - LLM_REFINEMENT_ENDPOINT=${LLM_REFINEMENT_ENDPOINT:-http://ollama:11434}
      - LLM_REFINEMENT_TIMEOUT=${LLM_REFINEMENT_TIMEOUT:-8.0}
      - LLM_REFINEMENT_TEMPERATURE=${LLM_REFINEMENT_TEMPERATURE:-0.7}
      - LLM_REFINEMENT_MAX_RETRIES=${LLM_REFINEMENT_MAX_RETRIES:-2}
      # Rate Limiting Configuration für Produktion
      - GLOBAL_RATE_LIMIT=${GLOBAL_RATE_LIMIT:-1200}
      - GLOBAL_RATE_WINDOW_SECONDS=${GLOBAL_RATE_WINDOW_SECONDS:-60}
      - MESSAGE_RATE_LIMIT=${MESSAGE_RATE_LIMIT:-50}
      - MESSAGE_RATE_WINDOW_SECONDS=${MESSAGE_RATE_WINDOW_SECONDS:-10}
      # Production Configuration (allows Figma and translate.smart-village.solutions)
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEVELOPMENT_CORS_ORIGINS=${DEVELOPMENT_CORS_ORIGINS:-http://localhost:5173,http://localhost:5174}

    # Health Checks
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Logging Configuration
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

    depends_on:
      - redis
      - ollama
    labels:
      - "traefik.enable=true"
      # Main HTTP router with WebSocket support
      - "traefik.http.routers.api_gateway.rule=Host(`ssf.smart-village.solutions`)"
      - "traefik.http.routers.api_gateway.entrypoints=websecure"
      - "traefik.http.routers.api_gateway.tls.certresolver=le"
      - "traefik.http.services.api_gateway.loadbalancer.server.port=8000"
      # Configure service to handle WebSocket upgrades
      - "traefik.http.services.api_gateway.loadbalancer.passhostheader=true"
      - "traefik.http.middlewares.websocket-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
    restart: always

  ollama:
    image: ollama/ollama:latest
    expose:
      - "11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: always

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    restart: always

  frontend-archive:
    build:
      context: ../ssf-frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend-archive.rule=Host(`translate-archive.smart-village.solutions`)"
      - "traefik.http.routers.frontend-archive.entrypoints=websecure"
      - "traefik.http.routers.frontend-archive.tls.certresolver=le"
    restart: always

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    environment:
      - VITE_API_BASE_URL=https://ssf.smart-village.solutions
      - VITE_WS_BASE_URL=wss://ssf.smart-village.solutions
      - VITE_APP_PASSWORD=${FRONTEND_DEMO_PASSWORD:-ssf2025kassel}
    networks:
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`translate.smart-village.solutions`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=le"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
      - "traefik.docker.network=ssf-backend_default"
    restart: always


  prometheus:
    image: prom/prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml
    expose:
      - "9090"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus-ssf.smart-village.solutions`)"
      - "traefik.http.routers.prometheus.entrypoints=websecure"
      - "traefik.http.routers.prometheus.tls=true"
      - "traefik.http.routers.prometheus.tls.certresolver=le"
      - "traefik.http.routers.prometheus.service=prometheus"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
      - "traefik.http.routers.prometheus-http.rule=Host(`prometheus-ssf.smart-village.solutions`)"
      - "traefik.http.routers.prometheus-http.entrypoints=web"
      - "traefik.http.routers.prometheus-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

  grafana:
    image: grafana/grafana:10.2.3
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_SECURITY_DISABLE_INITIAL_ADMIN_CREATION=false
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana:/var/lib/grafana
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana-ssf.smart-village.solutions`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.tls.certresolver=le"
      - "traefik.http.routers.grafana.service=grafana"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
      - "traefik.http.routers.grafana-http.rule=Host(`grafana-ssf.smart-village.solutions`)"
      - "traefik.http.routers.grafana-http.entrypoints=web"
      - "traefik.http.routers.grafana-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

  dcgm_exporter:
    image: nvidia/dcgm-exporter:latest
    restart: always
    privileged: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - DCGM_EXPORTER_LISTEN=0.0.0.0:9400
      - DCGM_EXPORTER_KUBERNETES=false
    expose:
      - "9400"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: ssf-backend-cadvisor
    restart: always
    privileged: true
    expose:
      - "8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    devices:
      - /dev/kmsg
    command:
      - '--housekeeping_interval=10s'
      - '--store_container_labels=true'

  loki:
    image: grafana/loki:2.9.3
    restart: always
    command: -config.file=/etc/loki/config.yaml
    expose:
      - "3100"
    volumes:
      - ./monitoring/loki-config.yaml:/etc/loki/config.yaml:ro
      - ./monitoring/loki-data:/loki

  promtail:
    image: grafana/promtail:2.9.3
    restart: always
    command: -config.file=/etc/promtail/config.yaml -log.level=debug
    depends_on:
      - loki
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./monitoring/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - ./monitoring/promtail-data:/var/lib/promtail

volumes:
  redis-data:
  ollama-data:
