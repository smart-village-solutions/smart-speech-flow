[flake8]
max-line-length = 88
select = E,W,F,C,N
ignore =
    E203,
    E501,
    W503,
    E402
per-file-ignores =
    __init__.py:F401,F403
    */tests/*:S101,S603,S607
exclude =
    .git,
    __pycache__,
    .venv,
    venv,
    build,
    dist,
    *.egg-info,
    .mypy_cache,
    .pytest_cache,
    docs,
    monitoring,
    letsencrypt
max-complexity = 35
docstring-convention = google
application-import-names = services
import-order-style = google